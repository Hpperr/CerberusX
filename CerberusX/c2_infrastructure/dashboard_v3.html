<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CERBERUS X | TACTICAL MONITORING SYSTEM</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --panel: #111; --warn: #ff003c; --critical: #ff8a00; }
        body { background: var(--bg); color: var(--neon); font-family: 'Consolas', 'Courier New', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar: Target Discovery */
        #sidebar { width: 380px; background: var(--panel); border-right: 1px solid #222; display: flex; flex-direction: column; box-shadow: 2px 0 10px rgba(0,0,0,0.5); }
        .header { padding: 20px; background: #000; border-bottom: 1px solid var(--neon); font-weight: bold; letter-spacing: 2px; }
        .scan-status { padding: 10px 20px; font-size: 11px; background: #0a0a0a; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
        
        #target-list { flex: 1; overflow-y: auto; padding: 15px; }
        .empty-state { text-align: center; margin-top: 40px; opacity: 0.4; font-size: 12px; line-height: 2; border: 1px dashed #444; padding: 20px; }
        
        .target-card { 
            padding: 15px; border: 1px solid #333; margin-bottom: 12px; cursor: pointer; 
            transition: all 0.3s ease; position: relative; background: #0d0d0d;
        }
        .target-card:hover { border-color: var(--neon); background: #151515; transform: scale(1.02); }
        .target-card.identified { border-left: 5px solid var(--warn); box-shadow: -5px 0 10px rgba(255, 0, 60, 0.2); }

        /* Main Workspace */
        #workspace { flex: 1; display: flex; flex-direction: column; }
        #view-port { flex: 1; position: relative; background: radial-gradient(circle, #111 0%, #000 100%); display: flex; align-items: center; justify-content: center; }
        .grid-overlay { position: absolute; width: 100%; height: 100%; background-image: linear-gradient(#1a1a1a 1px, transparent 1px), linear-gradient(90deg, #1a1a1a 1px, transparent 1px); background-size: 40px 40px; opacity: 0.2; pointer-events: none; }
        
        .no-signal { font-size: 18px; letter-spacing: 8px; opacity: 0.5; z-index: 1; text-transform: uppercase; }

        /* Tactical Console */
        #console { height: 250px; background: #000; border-top: 1px solid #333; padding: 15px; overflow-y: auto; font-size: 12px; box-shadow: 0 -5px 15px rgba(0,0,0,0.8); }
        .log-entry { margin-bottom: 6px; padding: 4px 8px; border-radius: 2px; border-left: 2px solid #444; }
        .log-entry.success { color: var(--neon); border-left-color: var(--neon); background: rgba(0, 255, 65, 0.05); }
        .log-entry.critical { color: var(--warn); border-left-color: var(--warn); background: rgba(255, 0, 60, 0.1); font-weight: bold; }
        .log-entry.info { color: var(--critical); border-left-color: var(--critical); }
        .timestamp { color: #555; margin-right: 10px; }

        /* Radar Animation */
        .radar-ping { width: 10px; height: 10px; background: var(--neon); border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(0, 255, 65, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 65, 0); } }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header">CERBERUS X // MODULE RECON</div>
    <div class="scan-status">
        <div><span class="radar-ping"></span> LISTENING...</div>
        <div>FOUND: <span id="count" style="color:var(--neon)">0</span></div>
    </div>
    <div id="target-list">
        <div class="empty-state" id="empty-msg">
            [!] NO SIGNATURES DETECTED<br>
            AWAITING PACKET ADAPTATION...
        </div>
    </div>
</div>

<div id="workspace">
    <div id="view-port">
        <div class="grid-overlay"></div>
        <div class="no-signal" id="main-status">SYSTEM IDLE - SELECT TARGET</div>
    </div>

    <div id="console" id="log-window">
        </div>
</div>

<script>
    // Tự động kết nối về Kali C2
    const socket = new WebSocket(`ws://${window.location.hostname}:8080`);
    let targetCount = 0;

    socket.onopen = () => {
        writeLog("Connection to Central Brain established.", "success");
    };

    socket.onmessage = (event) => {
        try {
            const data = JSON.parse(event.data);
            
            // 1. Cập nhật danh sách mục tiêu mới
            if (data.type === 'NEW_DEVICE') {
                document.getElementById('empty-msg').style.display = 'none';
                addTarget(data);
            }

            // 2. Cập nhật Log hệ thống (Success, Critical, Info)
            if (data.type === 'LOG') {
                writeLog(data.message, data.level);
            }

            // 3. Thông báo trích xuất dữ liệu thành công
            if (data.type === 'VAULT_DUMP' || data.type === 'AUTH_EXFIL') {
                const msg = data.type === 'AUTH_EXFIL' ? `[CRITICAL] Token Hijacked: ${data.data}` : `Vault data received from ${data.ip}`;
                writeLog(msg, "critical");
            }

        } catch (e) {
            console.error("Data parse error", e);
        }
    };

    function addTarget(device) {
        const list = document.getElementById('target-list');
        // Kiểm tra xem IP đã tồn tại chưa để tránh trùng lặp
        if (document.getElementById(`target-${device.ip.replace(/\./g, '-')}`)) return;

        targetCount++;
        document.getElementById('count').innerText = targetCount;
        
        const card = document.createElement('div');
        card.id = `target-${device.ip.replace(/\./g, '-')}`;
        card.className = `target-card ${device.is_target ? 'identified' : ''}`;
        card.innerHTML = `
            <div style="font-size:15px; margin-bottom:5px;"><strong>${device.ip}</strong></div>
            <div style="font-size:11px; opacity:0.6;">MAC: ${device.mac}</div>
            <div style="font-size:11px; color:${device.is_target ? 'var(--warn)' : 'var(--neon)'}">
                VENDOR: ${device.vendor} ${device.is_target ? ' // [SUSPECT]' : ''}
            </div>
        `;
        
        card.onclick = () => {
            document.getElementById('main-status').innerText = `ENGAGED: ${device.ip}`;
            writeLog(`Man-in-the-Middle active on ${device.ip}`, "info");
        };

        list.prepend(card);
    }

    function writeLog(msg, level = "info") {
        const logWin = document.getElementById('console');
        const entry = document.createElement('div');
        const time = new Date().toLocaleTimeString();
        entry.className = `log-entry ${level}`;
        entry.innerHTML = `<span class="timestamp">[${time}]</span> ${msg}`;
        logWin.appendChild(entry);
        logWin.scrollTop = logWin.scrollHeight;
    }

    socket.onerror = () => writeLog("C2 Link Failure. Check Backend Service.", "critical");
</script>

</body>
</html>
